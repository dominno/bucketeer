<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Bucketeer</title>
    <style>
      html, body { height: 100%; margin: 0; }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: #0f1216;
        color: #e8edf2;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      .mark { font-size: 52px; }
      .title { font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }
      .sub { font-size: 13px; color: #93a0ad; }
      .spinner {
        width: 26px; height: 26px; border-radius: 50%;
        border: 3px solid #272e37; border-top-color: #5b8cff;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="mark">🪣</div>
    <div class="title">Bucketeer</div>
    <div class="spinner"></div>
    <div class="sub">Starting…</div>
  </body>
</html>
